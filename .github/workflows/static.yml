name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: [ "main" ] # ⚠️ Change this to "master" if your repository default branch is master
  workflow_dispatch:

# Grant the permissions required to make a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent multiple concurrent deployments from stepping on each other
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Global override to force Node 24 runtime execution

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # Upgraded to completely bypass Node 20 triggers

      - name: Set up Node.js
        uses: actions/setup-node@v6 # Upgraded to support Node 24 runners cleanly
        with:
          node-version: 22 # Stable LTS Node environment for your Vite build
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages configuration
        uses: actions/configure-pages@v5

      - name: Upload built assets
        uses: actions/upload-pages-artifact@v5 # Upgraded to eliminate remaining warnings
        with:
          path: './dist' # Vite outputs production files to 'dist' by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # Upgraded version matching modern pipeline specs
